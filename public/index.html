<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Duke</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0f2e;
      color: #ede0c8;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100svh;
      padding: 24px 16px 32px;
      gap: 20px;
    }

    h1 {
      font-size: 1.6rem;
      letter-spacing: 0.08em;
      color: #c8a020;
    }

    /* ── Panels ──────────────────────────────────────────────────────────────── */

    .card {
      background: #271545;
      border: 1px solid #5a3a80;
      border-radius: 8px;
      padding: 24px 28px;
      width: min(360px, 100%);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card h2 {
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      color: #c8a020;
      border-bottom: 1px solid #3a2060;
      padding-bottom: 10px;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────────── */

    button {
      background: #3d1f6a;
      color: #ede0c8;
      border: 1px solid #7a50a0;
      border-radius: 4px;
      padding: 9px 18px;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      width: 100%;
    }

    button:hover:not(:disabled) { background: #5a3090; }
    button:disabled { opacity: 0.38; cursor: default; }

    /* ── Join row ────────────────────────────────────────────────────────────── */

    .join-row {
      display: flex;
      gap: 8px;
    }

    .join-row input {
      flex: 1;
      background: #1a0f2e;
      color: #ede0c8;
      border: 1px solid #5a3a80;
      border-radius: 4px;
      padding: 8px 10px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .join-row input::placeholder { color: #6a5080; letter-spacing: 0.05em; font-size: 0.85rem; }
    .join-row input:focus { outline: 1px solid #7a50a0; }

    .join-row button { width: auto; padding: 8px 16px; }

    /* ── Error / status text ─────────────────────────────────────────────────── */

    .error-msg {
      font-size: 0.82rem;
      color: #d46060;
      min-height: 1.1em;
    }

    .info-msg {
      font-size: 0.82rem;
      opacity: 0.68;
      text-align: center;
    }

    /* ── Code display ────────────────────────────────────────────────────────── */

    #code-box {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #code-value {
      flex: 1;
      font-size: 2rem;
      letter-spacing: 0.3em;
      color: #c8a020;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      padding: 10px 12px;
      background: rgba(0,0,0,0.30);
      border: 1px solid #7a50a0;
      border-radius: 6px;
    }

    #copy-btn {
      width: auto;
      padding: 8px 14px;
      font-size: 0.82rem;
    }

    /* ── Waiting status ──────────────────────────────────────────────────────── */

    #waiting-status {
      font-size: 0.88rem;
      text-align: center;
      opacity: 0.72;
      font-style: italic;
      min-height: 1.2em;
    }

    #waiting-status.joined {
      opacity: 1;
      font-style: normal;
      color: #70c870;
    }

    /* ── Player name ─────────────────────────────────────────────────────────── */

    .name-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      opacity: 0.70;
    }

    .name-row:focus-within { opacity: 1; }

    .name-row label { white-space: nowrap; }

    .name-row input {
      background: #1a0f2e;
      color: #ede0c8;
      border: 1px solid #3a2060;
      border-radius: 4px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 0.88rem;
      width: 160px;
    }

    .name-row input:focus { outline: 1px solid #7a50a0; }

    /* ── Divider ─────────────────────────────────────────────────────────────── */

    .or-divider {
      font-size: 0.78rem;
      opacity: 0.4;
      letter-spacing: 0.1em;
      text-align: center;
    }

    /* ── Offline row ─────────────────────────────────────────────────────────── */

    .btn-row { display: flex; gap: 10px; }
    .btn-row button { flex: 1; }

    /* ── Version string ──────────────────────────────────────────────────────── */

    .version {
      font-size: 0.68rem;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 0.05em;
      opacity: 0.28;
      margin-top: 8px;
    }

    /* ── My Games ────────────────────────────────────────────────────────────── */

    .game-row {
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 10px 0;
      border-bottom: 1px solid #3a2060;
    }

    .game-row:first-child { padding-top: 0; }
    .game-row:last-child  { border-bottom: none; padding-bottom: 0; }

    .game-row-top {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .game-code {
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      color: #c8a020;
      flex-shrink: 0;
    }

    .game-opponent {
      font-size: 0.85rem;
      opacity: 0.80;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .game-row-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .game-badge {
      font-size: 0.70rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
    }

    .badge-waiting  { background: rgba(255,255,255,0.06); color: #8a7aaa; }
    .badge-active   { background: rgba(200,160,32,0.15);  color: #c8a020; }
    .badge-gameover { background: rgba(255,255,255,0.06); color: #6a5a8a; }

    .game-actions { display: flex; gap: 6px; align-items: center; }

    .btn-sm { width: auto; padding: 4px 12px; font-size: 0.78rem; }

    .btn-remove {
      width: auto;
      background: none;
      border: none;
      color: #ede0c8;
      opacity: 0.35;
      padding: 4px 6px;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
    }

    .btn-remove:hover { opacity: 0.8; background: none; }

    #my-games-loading { font-size: 0.82rem; opacity: 0.50; font-style: italic; }
  </style>
</head>
<body>

<h1>The Duke</h1>

<div class="name-row">
  <label for="player-name">Your name:</label>
  <input type="text" id="player-name" placeholder="Anonymous" maxlength="20"
         autocomplete="off" spellcheck="false">
</div>

<!-- My Games (hidden until populated) -->
<div class="card" id="my-games-card" hidden>
  <h2>My Games</h2>
  <div id="my-games-body">
    <div id="my-games-loading">Loading&hellip;</div>
  </div>
</div>

<!-- Online: default view -->
<div class="card" id="online-card">
  <h2>Play Online</h2>
  <button id="create-btn">Create Game</button>
  <div class="join-row">
    <input type="text" id="join-input" placeholder="Enter code" maxlength="6" autocomplete="off" spellcheck="false">
    <button id="join-btn">Join</button>
  </div>
  <div class="error-msg" id="join-error"></div>
</div>

<!-- Online: after Create Game -->
<div class="card" id="create-card" hidden>
  <h2>Game Created</h2>
  <p class="info-msg">Share this code with your opponent:</p>
  <div id="code-box">
    <div id="code-value">------</div>
    <button id="copy-btn" title="Copy code">Copy</button>
  </div>
  <div id="waiting-status">Waiting for opponent to join&hellip;</div>
  <button id="enter-btn">Enter Game</button>
  <button id="cancel-btn">Cancel</button>
</div>

<div class="or-divider">— or —</div>

<div class="card">
  <h2>Play Locally</h2>
  <button id="local-btn">Local Game</button>
</div>

<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>

<!-- Tile renderer for favicon -->
<script src="js/tiles.js"></script>
<script src="js/tileRenderer.js"></script>

<script src="js/firebase.js"></script>

<script>
'use strict';

// ─── Favicon (same as game.html) ──────────────────────────────────────────────

(function () {
  const sz = 128;
  const fc = document.createElement('canvas');
  fc.width = sz; fc.height = sz;
  drawTile(fc.getContext('2d'), 0, 0, sz, 'duke', 0, 0);
  const link = document.createElement('link');
  link.rel  = 'icon';
  link.type = 'image/png';
  link.href = fc.toDataURL('image/png');
  document.head.appendChild(link);
}());

// ─── Player name (localStorage) ──────────────────────────────────────────────

const _nameInput = document.getElementById('player-name');
_nameInput.value = localStorage.getItem('duke_player_name') || '';
_nameInput.addEventListener('input', function () {
  localStorage.setItem('duke_player_name', this.value.trim());
});

function _playerName() {
  return localStorage.getItem('duke_player_name') || '';
}

// ─── My Games — localStorage helpers ─────────────────────────────────────────

function _loadMyGames() {
  try { return JSON.parse(localStorage.getItem('duke_my_games') || '[]'); }
  catch (_) { return []; }
}

function _saveMyGames(list) {
  localStorage.setItem('duke_my_games', JSON.stringify(list));
}

function saveMyGame(code, player, seed) {
  const list = _loadMyGames().filter(g => g.code !== code); // dedupe
  list.unshift({ code, player, seed });                      // newest first
  _saveMyGames(list.slice(0, 20));
}

function removeMyGame(code) {
  _saveMyGames(_loadMyGames().filter(g => g.code !== code));
  renderMyGames();
}

async function renderMyGames() {
  const list = _loadMyGames();
  const card = document.getElementById('my-games-card');
  const body = document.getElementById('my-games-body');

  if (list.length === 0) { card.hidden = true; return; }
  card.hidden = false;
  body.innerHTML = '<div id="my-games-loading">Loading\u2026</div>';

  let fetched;
  try {
    const db = firebase.firestore();
    fetched = await Promise.all(list.map(async g => {
      try {
        const snap = await db.collection('games').doc(g.code).get();
        if (!snap.exists) return { ...g, _dead: true };
        const d = snap.data();
        const opponentName = g.player === 0 ? (d.player1name || '') : (d.player0name || '');
        return { ...g, status: d.status, opponentName };
      } catch (_) {
        return { ...g, status: 'unknown', opponentName: '' };
      }
    }));
  } catch (_) {
    // Firebase not ready — show list without live status
    fetched = list.map(g => ({ ...g, status: 'unknown', opponentName: '' }));
  }

  // Silently remove games that no longer exist in Firestore
  const dead = fetched.filter(g => g._dead).map(g => g.code);
  if (dead.length) {
    _saveMyGames(_loadMyGames().filter(g => !dead.includes(g.code)));
    fetched = fetched.filter(g => !g._dead);
  }

  body.innerHTML = '';
  if (fetched.length === 0) { card.hidden = true; return; }

  const STATUS_LABEL = { waiting: 'Waiting', active: 'In Progress', gameover: 'Finished', unknown: '' };
  const STATUS_CLASS = { waiting: 'badge-waiting', active: 'badge-active', gameover: 'badge-gameover', unknown: 'badge-waiting' };

  fetched.forEach(g => {
    const label   = STATUS_LABEL[g.status] ?? '';
    const cls     = STATUS_CLASS[g.status]  ?? 'badge-waiting';
    const oppText = g.opponentName
      ? 'vs.\u00a0' + g.opponentName
      : (g.status === 'waiting' ? 'Waiting for opponent\u2026' : '');

    const row = document.createElement('div');
    row.className = 'game-row';
    row.innerHTML =
      '<div class="game-row-top">'
      +   '<span class="game-code"></span>'
      +   '<span class="game-opponent"></span>'
      + '</div>'
      + '<div class="game-row-bottom">'
      +   (label ? '<span class="game-badge ' + cls + '"></span>' : '<span></span>')
      +   '<div class="game-actions">'
      +     '<button class="btn-sm game-rejoin">Rejoin</button>'
      +     '<button class="btn-remove game-remove" title="Remove">\u00d7</button>'
      +   '</div>'
      + '</div>';

    row.querySelector('.game-code').textContent     = g.code;
    row.querySelector('.game-opponent').textContent = oppText;
    if (label) row.querySelector('.game-badge').textContent = label;

    row.querySelector('.game-rejoin').addEventListener('click', () => {
      window.location.href = 'game.html?code=' + g.code + '&player=' + g.player + '&seed=' + g.seed;
    });
    row.querySelector('.game-remove').addEventListener('click', () => removeMyGame(g.code));

    body.appendChild(row);
  });
}

// ─── State ────────────────────────────────────────────────────────────────────

let _createCode   = null;   // code for the game we just created
let _createSeed   = null;   // seed passed to game.html via URL
let _createFP     = null;   // firstPlayer for the created game
let _createUnsub  = null;   // Firestore listener for created game

// ─── Helpers ──────────────────────────────────────────────────────────────────

function showError(msg) {
  document.getElementById('join-error').textContent = msg;
}

function clearError() {
  document.getElementById('join-error').textContent = '';
}

// ─── Create flow ──────────────────────────────────────────────────────────────

document.getElementById('create-btn').addEventListener('click', async function () {
  this.disabled = true;
  clearError();
  if (!_playerName()) {
    showError('Enter your name before creating a game.');
    document.getElementById('player-name').focus();
    this.disabled = false;
    return;
  }
  try {
    await initFirebase();

    // Generate a seed; derive firstPlayer using the same PRNG as game.js.
    // We run _mulberry32 for enough steps to match createGame()'s bag shuffles
    // then read firstPlayer — but it's simpler to just use Math.random() here
    // since both clients will reconstruct identical state from the seed via createGame().
    _createSeed = Date.now() ^ (Math.random() * 0xFFFFFFFF | 0);

    // Determine firstPlayer: replicate the logic in createGame().
    // createGame shuffles bag0 and bag1 (each N draws), then does Math.floor(rng()*2).
    // Rather than replicating the shuffle, we compute it properly using game.js
    // which is NOT loaded on index.html.  Instead we just compute a random firstPlayer
    // here and pass it; game.html will re-derive it from seed (identical result).
    // We only need firstPlayer in the Firestore doc for informational purposes.
    // The authoritative value comes from createGame({ seed }) on game.html.
    _createFP = Math.round(Math.random());  // 0 or 1

    const { code } = await createOnlineGame(_createSeed, _createFP, _playerName());
    _createCode = code;
    saveMyGame(code, 0, _createSeed);

    // Switch to "code sharing" panel
    document.getElementById('online-card').hidden  = true;
    document.getElementById('create-card').hidden  = false;
    document.getElementById('code-value').textContent = code;

    // Listen for player 1 joining
    _createUnsub = listenToGame(code, function (data) {
      if (data.status === 'active') {
        const ws = document.getElementById('waiting-status');
        ws.textContent = 'Opponent joined \u2014 ready to play!';
        ws.classList.add('joined');
      }
    });

  } catch (e) {
    console.error(e);
    showError('Could not create game. Check your connection and try again.');
    this.disabled = false;
  }
});

// ─── Copy helper ─────────────────────────────────────────────────────────────
// Uses execCommand (works without page focus) with Clipboard API as backup.

function _copyText(text, btn, originalLabel) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(ta);
  if (!ok && navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(() => {});
    ok = true;
  }
  btn.textContent = ok ? 'Copied!' : 'Copy failed';
  setTimeout(() => { btn.textContent = originalLabel; }, 1800);
}

// ─── Copy code ────────────────────────────────────────────────────────────────

document.getElementById('copy-btn').addEventListener('click', function () {
  if (!_createCode) return;
  _copyText(_createCode, this, 'Copy');
});

// ─── Enter game (player 0) ────────────────────────────────────────────────────

document.getElementById('enter-btn').addEventListener('click', function () {
  if (!_createCode) return;
  if (_createUnsub) _createUnsub();
  window.location.href =
    `game.html?code=${_createCode}&player=0&seed=${_createSeed}`;
});

// ─── Cancel create ────────────────────────────────────────────────────────────

document.getElementById('cancel-btn').addEventListener('click', function () {
  if (_createUnsub) { _createUnsub(); _createUnsub = null; }
  _createCode = null;
  document.getElementById('create-card').hidden  = true;
  document.getElementById('online-card').hidden  = false;
  document.getElementById('create-btn').disabled = false;
  document.getElementById('waiting-status').textContent =
    'Waiting for opponent to join\u2026';
  document.getElementById('waiting-status').classList.remove('joined');
});

// ─── Join flow ────────────────────────────────────────────────────────────────

document.getElementById('join-btn').addEventListener('click', handleJoin);
document.getElementById('join-input').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') handleJoin();
});

async function handleJoin() {
  const raw  = document.getElementById('join-input').value.trim().toUpperCase();
  clearError();

  if (!_playerName()) {
    showError('Enter your name before joining a game.');
    document.getElementById('player-name').focus();
    return;
  }
  if (raw.length === 0) { showError('Enter a game code.'); return; }
  if (raw.length !== 6) { showError('Codes are 6 letters.'); return; }

  const joinBtn = document.getElementById('join-btn');
  joinBtn.disabled = true;

  try {
    await initFirebase();
    const result = await joinOnlineGame(raw, _playerName());

    if (!result) {
      showError('Game not found or already full.');
      joinBtn.disabled = false;
      return;
    }

    saveMyGame(raw, 1, result.seed);
    window.location.href =
      `game.html?code=${raw}&player=1&seed=${result.seed}`;

  } catch (e) {
    console.error(e);
    showError('Connection error. Please try again.');
    joinBtn.disabled = false;
  }
}

// ─── Local game ───────────────────────────────────────────────────────────────

document.getElementById('local-btn').addEventListener('click', function () {
  window.location.href = 'game.html';
});

// ─── Eager init + render My Games ─────────────────────────────────────────────

(async () => {
  try { await initFirebase(); } catch (_) {}
  renderMyGames();
})();

</script>

<div class="version">2026.04.13.01</div>
</body>
</html>
