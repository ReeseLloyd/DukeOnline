<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Duke</title>
  <!-- Firebase compat SDK (no Auth — identity is username+PIN hash) -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0f2e;
      color: #ede0c8;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100svh;
      padding: 12px 16px;
      gap: 8px;
    }

    h1 {
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      color: #c8a020;
    }

    /* ── Status bar ─────────────────────────────────────────────────────────── */

    #status {
      text-align: center;
      min-height: 3em;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 3px;
    }

    #status-player {
      font-size: 1rem;
      font-weight: bold;
    }

    #status-msg {
      font-size: 0.85rem;
      opacity: 0.75;
    }

    /* ── Board ──────────────────────────────────────────────────────────────── */

    #board-wrap { position: relative; }

    canvas { display: block; touch-action: manipulation; }

    /* ── Controls ───────────────────────────────────────────────────────────── */

    #controls {
      display: flex;
      gap: 10px;
      min-height: 38px;
      align-items: center;
    }

    button {
      background: #3d1f6a;
      color: #ede0c8;
      border: 1px solid #7a50a0;
      border-radius: 4px;
      padding: 7px 16px;
      font-family: inherit;
      font-size: 0.88rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { background: #5a3090; }
    button:disabled { opacity: 0.38; cursor: default; }

    /* ── Game-over card ─────────────────────────────────────────────────────── */

    /* Wrapper has no background — board shows through. pointer-events: none so
       clicks reach the board; the panel re-enables them for its own controls. */
    #gameover-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      pointer-events: none;
    }

    #gameover-overlay[hidden] { display: none; }

    .panel {
      background: #271545;
      border: 2px solid #7a50a0;
      border-radius: 8px;
      padding: 28px 32px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      pointer-events: auto;
    }

    .panel h2 { color: #c8a020; font-size: 1.3rem; }
    .panel p  { opacity: 0.8; line-height: 1.5; }

    .panel button { align-self: center; padding: 9px 24px; font-size: 0.95rem; }

    #gameover-close {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      color: #ede0c8;
      font-size: 1.1rem;
      line-height: 1;
      padding: 4px 6px;
      cursor: pointer;
      opacity: 0.55;
    }
    #gameover-close:hover { opacity: 1; background: none; }

    /* ── Post-game controls ─────────────────────────────────────────────────── */

    #postgame-controls {
      display: flex;
      gap: 10px;
      min-height: 38px;
      align-items: center;
    }
    #postgame-controls[hidden] { display: none; }

    /* ── Pending move (staged, awaiting confirm/undo) ───────────────────────── */

    #pending-controls {
      display: flex;
      gap: 10px;
      min-height: 38px;
      align-items: center;
    }
    #pending-controls[hidden] { display: none; }

    #pending-countdown {
      font-size: 0.80rem;
      opacity: 0.55;
      font-style: italic;
      white-space: nowrap;
    }

    #confirm-btn {
      background: #4a2880;
      border-color: #9a60c0;
    }
    #confirm-btn:hover:not(:disabled) { background: #6a3aa0; }

    #resign-btn[hidden] { display: none; }
    #resign-btn.confirming {
      background: #6a1a1a;
      border-color: #c04040;
    }
    #resign-btn.confirming:hover { background: #8a2020; }

    /* ── Thinking indicator ─────────────────────────────────────────────────── */

    #thinking {
      font-size: 0.85rem;
      opacity: 0.65;
      font-style: italic;
      min-height: 1.2em;
    }

    /* ── Draw preview ───────────────────────────────────────────────────────── */

    #draw-preview {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #7a50a0;
      border-radius: 6px;
      padding: 10px 16px;
    }

    #draw-preview[hidden] { display: none; }

    #draw-tile-name {
      font-size: 1rem;
      font-weight: bold;
      color: #c8a020;
      margin-bottom: 4px;
    }

    #draw-tile-hint {
      font-size: 0.82rem;
      opacity: 0.70;
    }

    /* ── Flip-side preview ──────────────────────────────────────────────────── */

    #flip-preview {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #4a3080;
      border-radius: 6px;
      padding: 10px 16px;
    }

    #flip-preview[hidden] { display: none; }

    #flip-tile-name {
      font-size: 0.9rem;
      font-weight: bold;
      color: #b89820;
      margin-bottom: 4px;
    }

    #flip-tile-hint {
      font-size: 0.78rem;
      opacity: 0.60;
    }

    /* ── Mode / difficulty overlay ──────────────────────────────────────────── */

    .overlay { position: fixed; inset: 0; background: rgba(10,5,22,0.85);
               display: flex; align-items: center; justify-content: center; z-index: 20; }
    .overlay[hidden] { display: none; }

    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

    #difficulty-section { display: flex; flex-direction: column; gap: 10px; }
    #difficulty-section[hidden] { display: none; }
    #difficulty-section p { opacity: 0.75; font-size: 0.9rem; }

    /* ── Waiting overlay (online: player 0 waiting for opponent) ───────────── */

    #waiting-code {
      font-size: 2.4rem;
      letter-spacing: 0.28em;
      color: #c8a020;
      font-family: 'Courier New', Courier, monospace;
      text-align: center;
      padding: 12px 16px;
      background: rgba(0,0,0,0.30);
      border: 1px solid #7a50a0;
      border-radius: 6px;
    }

    #waiting-copy-btn {
      align-self: center;
      padding: 7px 20px;
      font-size: 0.85rem;
    }

    #waiting-join-msg {
      font-size: 0.88rem;
      opacity: 0.7;
      text-align: center;
      font-style: italic;
    }

    #waiting-join-msg.joined {
      opacity: 1;
      font-style: normal;
      color: #70c870;
    }

    #diff-slider {
      width: 100%;
      accent-color: #7a50a0;
      cursor: pointer;
      margin: 4px 0 2px;
    }

    #diff-label { color: #c8a020; font-weight: bold; }

    /* ── Version string ──────────────────────────────────────────────────────── */

    .version {
      font-size: 0.68rem;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 0.05em;
      opacity: 0.28;
      margin-top: 8px;
    }
  </style>
</head>
<body>

<h1>The Duke</h1>

<div id="status">
  <div id="status-player"></div>
  <div id="status-msg"></div>
</div>

<div id="board-wrap">
  <canvas id="board"></canvas>
</div>

<div id="controls">
  <button id="draw-btn" disabled>Draw from Bag</button>
  <button id="cancel-btn" hidden>Cancel</button>
  <button id="resign-btn" hidden>Resign</button>
  <button id="lobby-btn">Lobby</button>
</div>

<div id="pending-controls" hidden>
  <button id="undo-btn">Undo Move</button>
  <button id="confirm-btn">Confirm Move</button>
  <span id="pending-countdown"></span>
</div>

<div id="postgame-controls" hidden>
  <button id="lobby-btn-post">Return to Lobby</button>
</div>

<div id="thinking"></div>

<div id="flip-preview" hidden>
  <canvas id="flip-tile-canvas" width="90" height="90"></canvas>
  <div>
    <div id="flip-tile-name"></div>
    <div id="flip-tile-hint">Flip side (after moving)</div>
  </div>
</div>

<div id="draw-preview" hidden>
  <canvas id="draw-tile-canvas" width="90" height="90"></canvas>
  <div>
    <div id="draw-tile-name"></div>
    <div id="draw-tile-hint">Click a highlighted square to place it.</div>
  </div>
</div>

<!-- Mode selection overlay -->
<div id="mode-overlay" class="overlay">
  <div class="panel">
    <h2>The Duke</h2>
    <p>Choose how to play:</p>
    <div class="btn-row">
      <button id="mode-hotseat">1v1</button>
      <button id="mode-ai">vs. AI</button>
    </div>
    <div id="difficulty-section" hidden>
      <p>Difficulty: <span id="diff-label">4 &#x2014; Medium</span></p>
      <input type="range" id="diff-slider" min="1" max="8" value="4">
      <button id="diff-start">Start Game</button>
    </div>
  </div>
</div>

<!-- Online: waiting for opponent to join (shown only for the game creator) -->
<div id="waiting-overlay" class="overlay" hidden>
  <div class="panel">
    <h2>Waiting for Opponent</h2>
    <p style="opacity:0.75;font-size:0.9rem">Share this code:</p>
    <div id="waiting-code"></div>
    <button id="waiting-copy-btn">Copy Code</button>
    <div id="waiting-join-msg">Waiting for your opponent to join&hellip;</div>
  </div>
</div>

<div id="gameover-overlay" hidden>
  <div class="panel">
    <button id="gameover-close" title="Dismiss">&#x2715;</button>
    <h2 id="gameover-title"></h2>
    <p id="gameover-msg"></p>
    <button id="new-game-btn">New Game</button>
  </div>
</div>

<script src="js/tiles.js"></script>
<script src="js/tileRenderer.js"></script>
<script src="js/game.js"></script>
<script src="js/ai.js"></script>
<script src="js/firebase.js"></script>
<script>
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────

const PLAYER_NAMES = ['White', 'Brown'];

// Board cell background (checkerboard)
const CELL_LIGHT = '#efe0c9';
const CELL_DARK  = '#c9a87c';

// Highlight fill/stroke per action type
const HIGHLIGHTS = {
  setup:      { fill: 'rgba(255,210,40,0.42)' },
  selected:   { fill: 'rgba(255,200,0,0.20)', stroke: 'rgba(255,190,0,0.90)', lw: 3 },
  move:       { fill: 'rgba(0,175,75,0.38)' },
  strike:     { fill: 'rgba(210,30,30,0.44)' },
  draw:       { fill: 'rgba(20,130,220,0.40)' },
  'cmd-from': { fill: 'rgba(155,0,210,0.40)' },
  'cmd-to':   { fill: 'rgba(220,115,0,0.44)' },
};

// ─── Canvas ───────────────────────────────────────────────────────────────────

const canvas = document.getElementById('board');
const ctx    = canvas.getContext('2d');
let   cellSz = 100;

function resizeCanvas() {
  const avail = Math.min(
    window.innerWidth  - 32,
    window.innerHeight - 185,   // room for title + status + controls
    560
  );
  const sz  = Math.max(240, Math.floor(avail / 6) * 6);
  canvas.width  = sz;
  canvas.height = sz;
  cellSz = sz / 6;
  render();
}

window.addEventListener('resize', resizeCanvas);

// ─── Game state ───────────────────────────────────────────────────────────────

let state      = createGame();
let legalMoves = [];   // valid for state.currentPlayer when phase === 'active'

// ─── AI / game mode ───────────────────────────────────────────────────────────

let gameMode   = 'hotseat';   // 'hotseat' | 'ai'
let aiDepth    = 4;           // search depth — set by difficulty selector
let aiWorker   = null;
let aiThinking = false;
let animating        = false;  // true while a move animation is playing
let animOverlay      = null;   // { phase: 0|1, from: [c,r]|null, to: [c,r]|null }
let _stagingAnimation = false; // true only during the player's own move-staging animation

let _pendingMove     = null;  // staged move awaiting confirmation (or null)
let _pendingPreState = null;  // board state snapshot before the staged move
let _pendingTimerId  = null;  // setInterval ID for auto-confirm countdown
let _pendingSeconds  = 0;     // seconds remaining on the countdown

const PENDING_TIMEOUT = 60;   // seconds before auto-confirm fires

function _startPendingTimer() {
  _clearPendingTimer();
  _pendingSeconds = PENDING_TIMEOUT;
  _updateCountdown();
  _pendingTimerId = setInterval(function () {
    _pendingSeconds--;
    _updateCountdown();
    if (_pendingSeconds <= 0) {
      _clearPendingTimer();
      submitTurn();
    }
  }, 1000);
}

function _clearPendingTimer() {
  if (_pendingTimerId) { clearInterval(_pendingTimerId); _pendingTimerId = null; }
  _pendingSeconds = 0;
  _updateCountdown();
}

function _updateCountdown() {
  const el = document.getElementById('pending-countdown');
  if (!el) return;
  el.textContent = _pendingSeconds > 0 ? 'Auto-confirm in ' + _pendingSeconds + 's' : '';
}

// ─── Draw-mode persistence (online) ──────────────────────────────────────────
// When a player clicks "Draw from Bag" they are committed to placing that tile
// this turn. If they navigate to the lobby and return before placing, we must
// restore draw mode so they can't escape the obligation.
// The flag is keyed by game code + turn number so stale flags are ignored.

function _saveDrawCommitted() {
  if (!_onlineMode) return;
  localStorage.setItem('duke_draw_' + _onlineCode, state.turn.toString());
}

function _clearDrawCommitted() {
  if (!_onlineMode) return;
  localStorage.removeItem('duke_draw_' + _onlineCode);
}

/**
 * Called after state/legalMoves are updated. If the player had clicked
 * "Draw from Bag" this turn and navigated away, re-enter draw mode so they
 * cannot sidestep the draw obligation by returning to the lobby.
 */
function _checkRestoreDrawMode() {
  if (!_onlineMode || state.phase !== 'active' || !_isMyTurn() || _pendingMove !== null) return;
  const saved = localStorage.getItem('duke_draw_' + _onlineCode);
  if (saved === null || parseInt(saved) !== state.turn) return;

  enterMode('draw');
  const p    = state.currentPlayer;
  const next = peekBag(state, p);
  if (next) {
    const pc  = document.getElementById('draw-tile-canvas');
    const sz  = 90;
    pc.width  = sz; pc.height = sz;
    drawTile(pc.getContext('2d'), 0, 0, sz, next, 0, p);
    document.getElementById('draw-tile-name').textContent = TILE_DISPLAY_NAMES[next] ?? next;
    document.getElementById('draw-preview').hidden = false;
  }
}

// ─── Online mode ──────────────────────────────────────────────────────────────
// Populated from URL params when arriving from index.html.
// _onlineMode=false means hotseat/AI — all the old code paths remain unchanged.

const _urlParams        = new URLSearchParams(window.location.search);
const _onlineCode       = _urlParams.get('code');
const _onlineSeed       = parseInt(_urlParams.get('seed')) || null;
const _onlinePlayerStr  = _urlParams.get('player');
const _onlineMode       = !!(_onlineCode && _onlineSeed && _onlinePlayerStr !== null);
const _myPlayerIndex    = _onlineMode ? parseInt(_onlinePlayerStr) : null;

let _ignoreNextSnapshot = false;  // skip the echo of our own Firestore write
let _onlineUnsub        = null;   // Firestore listener unsubscribe fn
let _myName             = '';     // from localStorage; shown in status bar
let _opponentName       = '';     // from Firestore once opponent joins

// ─── Clipboard helper ─────────────────────────────────────────────────────────
// execCommand works without page focus; Clipboard API used as fallback only.

function _copyToClipboard(text, btn, originalLabel) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  let ok = false;
  try { ok = document.execCommand('copy'); } catch (_) {}
  document.body.removeChild(ta);
  if (!ok && navigator.clipboard) {
    navigator.clipboard.writeText(text).catch(() => {});
    ok = true;
  }
  btn.textContent = ok ? 'Copied!' : 'Copy failed';
  setTimeout(() => { btn.textContent = originalLabel; }, 1800);
}

// ─── Online helpers ───────────────────────────────────────────────────────────

/** True when it is this client's turn to act. Always true in offline modes. */
function _isMyTurn() {
  return !_onlineMode || state.currentPlayer === _myPlayerIndex;
}

/** True when Player 1's client should see the board rotated 180° (their pieces at bottom). */
function _boardFlipped() {
  return _onlineMode && _myPlayerIndex === 1;
}

/**
 * Write the current state to Firestore after a move or setup placement.
 * Sets _ignoreNextSnapshot so our own write doesn't trigger a redundant update.
 * @param {object|null} move  The move (active phase) or null (setup placement).
 */
async function _syncToFirestore(move) {
  _ignoreNextSnapshot = true;
  try {
    await writeGameState(_onlineCode, state, move ?? null);
  } catch (e) {
    console.error('Firestore write failed:', e);
    _ignoreNextSnapshot = false;
  }
}

/**
 * Firestore snapshot handler — called whenever the game doc changes.
 * Ignores our own writes; animates opponent moves; snaps setup placements.
 */
function _onGameSnapshot(data) {
  if (_ignoreNextSnapshot) { _ignoreNextSnapshot = false; return; }

  // Pick up opponent's name whenever the doc contains it.
  const oppField = _myPlayerIndex === 0 ? 'player1name' : 'player0name';
  if (data[oppField]) _opponentName = data[oppField];

  // Still waiting for player 1 to join — nothing to render yet.
  if (data.status === 'waiting') return;

  // Player 1 just joined (player 0's waiting overlay is visible).
  const waitingEl = document.getElementById('waiting-overlay');
  if (!waitingEl.hidden) {
    waitingEl.hidden = true;
    const msg = document.getElementById('waiting-join-msg');
    msg.textContent = 'Opponent joined!';
    msg.classList.add('joined');

    // If no state written yet (no placements), use local state and re-render.
    if (!data.state) { render(); updateUI(); return; }
  }

  // No state written yet — both clients use their local createGame({ seed }) state.
  if (!data.state) return;

  const newState = data.state;
  const lastMove = data.lastMove;  // null for setup placements

  if (lastMove) {
    // Opponent made an active move — animate it.
    const preState = state;
    playMoveAnimation(preState, newState, lastMove, function () {
      state      = newState;
      legalMoves = state.phase === 'active' ? getLegalMoves(state) : [];
      _checkRestoreDrawMode();
      render();
      updateUI();
    });
  } else {
    // Setup placement — instant snap.
    state      = newState;
    legalMoves = state.phase === 'active' ? getLegalMoves(state) : [];
    _checkRestoreDrawMode();
    render();
    updateUI();
  }
}

/**
 * Initialise online mode: sign in anonymously, build local state, start listener.
 * Called at boot when URL params indicate an online game.
 */
async function _initOnlineGame() {
  try {
    await initFirebase();
  } catch (e) {
    console.error('Firebase init failed:', e);
    document.getElementById('status-msg').textContent =
      'Could not connect to server. Please refresh.';
    return;
  }

  // Load own name from localStorage (set on the lobby page).
  _myName = localStorage.getItem('duke_player_name') || '';

  // Both players reconstruct identical state from the shared seed.
  state      = createGame({ seed: _onlineSeed });
  legalMoves = [];

  if (_myPlayerIndex === 0) {
    // Show waiting overlay with the game code.
    document.getElementById('waiting-code').textContent = _onlineCode;
    document.getElementById('waiting-overlay').hidden   = false;
    document.getElementById('mode-overlay').hidden      = true;

    document.getElementById('waiting-copy-btn').addEventListener('click', function () {
      _copyToClipboard(_onlineCode, this, 'Copy Code');
    });
  } else {
    // Player 1: game is already active, start immediately.
    document.getElementById('mode-overlay').hidden = true;
    render();
    updateUI();
  }

  // Subscribe to game updates.
  _onlineUnsub = listenToGame(_onlineCode, _onGameSnapshot);
}

function _applyAIMove(move) {
  aiThinking = false;
  document.getElementById('thinking').textContent = '';
  if (state.phase !== 'active') { render(); updateUI(); return; }
  if (!move) { render(); updateUI(); return; }

  const preState  = state;
  const postState = applyMove(preState, move);
  playMoveAnimation(preState, postState, move, function () {
    legalMoves = state.phase === 'active' ? getLegalMoves(state) : [];
    render();
    updateUI();
  });
}

function _runAIOnMainThread() {
  // Fallback when Web Workers are unavailable. Uses setTimeout so the browser
  // can paint the "AI is thinking…" message before the blocking computation.
  setTimeout(function () {
    const move = getBestMove(state, aiDepth);
    _applyAIMove(move);
  }, 30);
}

function initWorker() {
  if (aiWorker) { aiWorker.terminate(); aiWorker = null; }
  try {
    aiWorker = new Worker('js/ai-worker.js');
    aiWorker.onmessage = function (evt) { _applyAIMove(evt.data.move); };
    aiWorker.onerror   = function (err) {
      console.warn('AI worker error, falling back to main thread:', err);
      aiWorker = null;
      _runAIOnMainThread();
    };
  } catch (e) {
    console.warn('Workers unavailable, running AI on main thread:', e);
    aiWorker = null;
  }
}

function triggerAISetup() {
  if (gameMode !== 'ai' || state.phase !== 'setup') return;
  const info = getSetupInfo(state);
  if (!info || info.player !== 1) return;

  // Pick a random valid placement target
  const targets = info.targets;
  if (targets.length === 0) return;

  setTimeout(function () {
    // Re-check in case something changed while waiting
    if (state.phase !== 'setup') return;
    const info2 = getSetupInfo(state);
    if (!info2 || info2.player !== 1) return;

    const t   = info2.targets;
    const pos = t[Math.floor(Math.random() * t.length)];
    state = applySetupPlacement(state, pos[0], pos[1]);

    if (state.phase === 'active') {
      legalMoves = getLegalMoves(state);
      triggerAI();
    } else {
      triggerAISetup();   // more AI placements remain
    }
    render(); updateUI();
  }, 500);
}

function triggerAI() {
  if (gameMode !== 'ai' || state.phase !== 'active' || state.currentPlayer !== 1) return;
  aiThinking = true;
  document.getElementById('thinking').textContent = 'AI is thinking\u2026';
  if (aiWorker) {
    aiWorker.postMessage({ state, depth: aiDepth });
  } else {
    _runAIOnMainThread();
  }
}

// ─── Move animation ───────────────────────────────────────────────────────────

function _getAnimPositions(move) {
  if (move.action === 'move')    return { from: move.from,  to: move.to     };
  if (move.action === 'strike')  return { from: move.from,  to: move.target };
  if (move.action === 'command') return { from: move.from,  to: move.to     };
  if (move.action === 'draw')    return { from: move.pos,   to: move.pos    };
  return { from: null, to: null };
}

/**
 * Play a two-phase highlight animation for a move, then call onDone.
 * Phase 0 (~380 ms): show preState with source cell highlighted yellow.
 * Phase 1 (~320 ms): show postState with destination cell highlighted green.
 * After both phases, animating is cleared and onDone() is called.
 * state is left pointing at postState when onDone fires.
 */
function playMoveAnimation(preState, postState, move, onDone) {
  const { from, to } = _getAnimPositions(move);
  animating = true;

  state      = preState;
  animOverlay = { phase: 0, from, to };
  render();

  setTimeout(function () {
    state      = postState;
    animOverlay = { phase: 1, from, to };
    render();

    setTimeout(function () {
      animOverlay = null;
      animating   = false;
      onDone();
    }, 320);
  }, 380);
}

// ─── UI state ─────────────────────────────────────────────────────────────────
//   mode:       'idle' | 'selected' | 'cmd-to' | 'draw'
//   uiSelected: [c, r]  — selected tile (move / strike / command origin)
//   uiCmdrPos:  [c, r]  — commander tile (while choosing commanded tile destination)
//   uiCmdFrom:  [c, r]  — commanded tile's current square (while choosing destination)

let uiMode     = 'idle';
let uiSelected = null;
let uiCmdrPos  = null;
let uiCmdFrom  = null;

function resetUI() {
  uiMode = 'idle'; uiSelected = null; uiCmdrPos = null; uiCmdFrom = null;
  document.getElementById('cancel-btn').hidden = true;
  document.getElementById('draw-preview').hidden = true;
  document.getElementById('flip-preview').hidden = true;
}

function _showFlipPreview(col, row, hint) {
  const cell = state.board[row]?.[col];
  if (!cell) { document.getElementById('flip-preview').hidden = true; return; }

  const flipSide = 1 - cell.side;
  const pc  = document.getElementById('flip-tile-canvas');
  const sz  = 90;
  pc.width  = sz;
  pc.height = sz;
  const pCtx = pc.getContext('2d');

  const shouldRotate = _boardFlipped() ? cell.player === 0 : cell.player === 1;
  if (shouldRotate) {
    pCtx.save();
    pCtx.translate(sz / 2, sz / 2);
    pCtx.rotate(Math.PI);
    drawTile(pCtx, -sz / 2, -sz / 2, sz, cell.type, flipSide, cell.player);
    pCtx.restore();
  } else {
    drawTile(pCtx, 0, 0, sz, cell.type, flipSide, cell.player);
  }

  document.getElementById('flip-tile-name').textContent =
    TILE_DISPLAY_NAMES[cell.type] ?? cell.type;
  document.getElementById('flip-tile-hint').textContent =
    hint || 'Flip side (after moving)';
  document.getElementById('flip-preview').hidden = false;
}

function enterMode(mode) {
  uiMode = mode;
  // Cancel is suppressed in draw mode: once "Draw from Bag" is clicked the
  // player has committed to placing the tile (per the rules).
  document.getElementById('cancel-btn').hidden = (mode === 'idle' || mode === 'draw');
}

// ─── Highlight computation ────────────────────────────────────────────────────

function cellKey(c, r) { return `${c},${r}`; }

function computeHighlights() {
  const h = new Map();

  // Setup phase: highlight valid placement squares for the current step
  if (state.phase === 'setup') {
    const info = getSetupInfo(state);
    if (info) for (const [c, r] of info.targets) h.set(cellKey(c, r), 'setup');
    return h;
  }

  if (state.phase !== 'active') return h;

  if (uiMode === 'draw') {
    for (const m of legalMoves)
      if (m.action === 'draw') h.set(cellKey(...m.pos), 'draw');
    return h;
  }

  if (uiMode === 'selected' && uiSelected) {
    const [sc, sr] = uiSelected;
    h.set(cellKey(sc, sr), 'selected');
    for (const m of legalMoves) {
      if (m.action === 'move'    && m.from[0] === sc && m.from[1] === sr)
        h.set(cellKey(...m.to),     'move');
      if (m.action === 'strike'  && m.from[0] === sc && m.from[1] === sr)
        h.set(cellKey(...m.target), 'strike');
      if (m.action === 'command' && m.commander[0] === sc && m.commander[1] === sr)
        if (!h.has(cellKey(...m.from))) h.set(cellKey(...m.from), 'cmd-from');
    }
    return h;
  }

  if (uiMode === 'cmd-to' && uiCmdrPos && uiCmdFrom) {
    const [cc, cr] = uiCmdrPos;
    const [fc, fr] = uiCmdFrom;
    h.set(cellKey(cc, cr), 'selected');
    h.set(cellKey(fc, fr), 'cmd-from');
    for (const m of legalMoves)
      if (m.action === 'command' &&
          m.commander[0] === cc && m.commander[1] === cr &&
          m.from[0] === fc && m.from[1] === fr)
        h.set(cellKey(...m.to), 'cmd-to');
    return h;
  }

  return h;
}

// ─── Rendering ────────────────────────────────────────────────────────────────

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const hi      = computeHighlights();
  const flipped = _boardFlipped();

  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 6; c++) {
      // When flipped (Player 1's perspective), rotate the board 180°:
      // their pieces sit at the bottom, opponent's at the top.
      const x  = flipped ? (5 - c) * cellSz : c * cellSz;
      const sy = flipped ? r * cellSz        : (5 - r) * cellSz;

      // Checkerboard cell (parity is preserved under 180° rotation)
      ctx.fillStyle = (c + r) % 2 === 0 ? CELL_LIGHT : CELL_DARK;
      ctx.fillRect(x, sy, cellSz, cellSz);

      // Tiles facing away from the viewing player are rotated 180°.
      // Normal view: Player 1's tiles rotate. Flipped view: Player 0's tiles rotate.
      const cell = state.board[r][c];
      if (cell) {
        const shouldRotate = flipped ? cell.player === 0 : cell.player === 1;
        if (shouldRotate) {
          ctx.save();
          ctx.translate(x + cellSz / 2, sy + cellSz / 2);
          ctx.rotate(Math.PI);
          drawTile(ctx, -cellSz / 2, -cellSz / 2, cellSz, cell.type, cell.side, cell.player);
          ctx.restore();
        } else {
          drawTile(ctx, x, sy, cellSz, cell.type, cell.side, cell.player);
        }
      }

      // Highlight overlay (drawn on top of tile so it's always visible)
      const hType = hi.get(cellKey(c, r));
      if (hType) {
        const s = HIGHLIGHTS[hType];
        ctx.fillStyle = s.fill;
        ctx.fillRect(x, sy, cellSz, cellSz);
        if (s.stroke) {
          ctx.strokeStyle = s.stroke;
          ctx.lineWidth   = s.lw;
          const inset = s.lw / 2;
          ctx.strokeRect(x + inset, sy + inset, cellSz - s.lw, cellSz - s.lw);
        }
      }

      // Animation overlay
      if (animOverlay) {
        if (animOverlay.phase === 0 &&
            animOverlay.from && animOverlay.from[0] === c && animOverlay.from[1] === r) {
          ctx.fillStyle = 'rgba(255, 215, 0, 0.68)';
          ctx.fillRect(x, sy, cellSz, cellSz);
        }
        if (animOverlay.phase === 1) {
          if (animOverlay.from && animOverlay.from[0] === c && animOverlay.from[1] === r) {
            ctx.fillStyle = 'rgba(255, 215, 0, 0.24)';
            ctx.fillRect(x, sy, cellSz, cellSz);
          }
          if (animOverlay.to && animOverlay.to[0] === c && animOverlay.to[1] === r) {
            ctx.fillStyle = 'rgba(30, 200, 110, 0.62)';
            ctx.fillRect(x, sy, cellSz, cellSz);
          }
        }
      }
    }
  }

  // Guard highlight — red ring on the threatened Duke, drawn above all other overlays.
  // Guard is a "you're in danger — act" signal, so it only shows when a local human player
  // is the one to move.  This suppresses flashes in all modes:
  //   hotseat  — both players share the screen, so always shown
  //   AI       — only when the human (player 0) is to move, not during the AI's turn
  //   online   — only when it's this client's turn, not while waiting for the opponent
  // Also suppressed during animation and while a move is staged (prevents hunting).
  if (state.phase === 'active' && !_stagingAnimation && _pendingMove === null && isDukeInGuard(state)) {
    const gp = state.currentPlayer;
    outer: for (let r = 0; r < 6; r++) {
      for (let c = 0; c < 6; c++) {
        const cell = state.board[r][c];
        if (cell && cell.type === 'duke' && cell.player === gp) {
          const gx  = flipped ? (5 - c) * cellSz : c * cellSz;
          const gsy = flipped ? r * cellSz        : (5 - r) * cellSz;
          ctx.fillStyle = 'rgba(210, 30, 30, 0.28)';
          ctx.fillRect(gx, gsy, cellSz, cellSz);
          ctx.strokeStyle = 'rgba(220, 50, 50, 0.90)';
          ctx.lineWidth   = 3;
          ctx.strokeRect(gx + 1.5, gsy + 1.5, cellSz - 3, cellSz - 3);
          break outer;
        }
      }
    }
  }

  // Board border — gold when a move is staged to signal "preview mode"
  ctx.strokeStyle = _pendingMove ? '#c8a020' : '#5a3a80';
  ctx.lineWidth   = _pendingMove ? 3 : 2;
  ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
}

// ─── Status / UI text ─────────────────────────────────────────────────────────

function updateUI() {
  const playerEl = document.getElementById('status-player');
  const msgEl    = document.getElementById('status-msg');
  const drawBtn  = document.getElementById('draw-btn');

  // Favicon + tab title alert: online only, active phase, your turn, nothing staged
  if (_onlineMode) {
    _setFaviconAlert(
      state.phase === 'active' && _isMyTurn() && _pendingMove === null
    );
  }

  const resignBtn = document.getElementById('resign-btn');

  // Suppress the win declaration until the move is confirmed — prevents
  // hunting for a winning move by staging, checking result, then undoing.
  if (state.phase === 'gameover' && _pendingMove === null) {
    const w = state.winner;
    playerEl.textContent = `Player ${w + 1} (${PLAYER_NAMES[w]}) wins!`;
    playerEl.style.color = w === 0 ? '#e8d9c0' : '#c8a477';
    msgEl.textContent    = 'View the final board, then start a New Game below.';
    drawBtn.disabled     = true;
    resignBtn.hidden     = true;
    showGameOver();
    return;
  }

  resignBtn.hidden = false;

  document.getElementById('gameover-overlay').hidden = true;

  const p = state.currentPlayer;

  // Pending: a piece/move has been staged, awaiting confirm/undo.
  // Evaluated before the setup/active branch so it intercepts both phases.
  // Use _pendingPreState.currentPlayer for the staging player — always correct,
  // unlike (1 - state.currentPlayer) which fails when currentPlayer doesn't
  // advance between consecutive setup steps for the same player.
  if (_pendingMove !== null) {
    const sp = _pendingPreState.currentPlayer;
    if (_onlineMode) {
      playerEl.textContent = _myName || 'You';
    } else {
      playerEl.textContent = `Player ${sp + 1} (${PLAYER_NAMES[sp]})`;
    }
    playerEl.style.color = sp === 0 ? '#ede0c8' : '#c8a477';

    if (_pendingMove.action === 'draw') {
      msgEl.textContent = 'Tile placed \u2014 confirm or choose a different square.';
      document.getElementById('undo-btn').textContent = 'Change Placement';
    } else if (_pendingMove.action === 'setup') {
      msgEl.textContent = 'Piece placed \u2014 confirm or undo.';
      document.getElementById('undo-btn').textContent = 'Undo Placement';
    } else {
      msgEl.textContent = 'Move staged \u2014 confirm or undo.';
      document.getElementById('undo-btn').textContent = 'Undo Move';
    }
    document.getElementById('confirm-btn').textContent = 'Confirm';
    drawBtn.disabled = true;
    return;
  }

  if (state.phase === 'setup') {
    const info = getSetupInfo(state);
    const p    = info.player;
    if (_onlineMode) {
      const name = (p === _myPlayerIndex)
        ? (_myName || 'You') : (_opponentName || 'Opponent');
      playerEl.textContent = `${name} \u2014 Setup`;
    } else {
      playerEl.textContent = `Player ${p + 1} (${PLAYER_NAMES[p]}) — Setup`;
    }
    playerEl.style.color = p === 0 ? '#ede0c8' : '#c8a477';
    const firstLabel = `Player ${state.firstPlayer + 1} (${PLAYER_NAMES[state.firstPlayer]}) moves first.`;
    if (gameMode === 'ai' && p === 1) {
      msgEl.textContent = 'AI is placing its pieces\u2026';
    } else if (_onlineMode && p !== _myPlayerIndex) {
      msgEl.textContent = 'Opponent is placing their pieces\u2026';
    } else {
      msgEl.textContent = info.subStep === 0
        ? `Click a highlighted column to place your Duke. ${firstLabel}`
        : `Click a highlighted square to place Footman ${info.subStep} of 2.`;
    }
    drawBtn.disabled = true;
    return;
  }

  // Active phase
  const isAiTurn   = gameMode === 'ai' && p === 1;
  const isOppTurn  = _onlineMode && !_isMyTurn();
  const inGuard    = isDukeInGuard(state);

  if (_onlineMode) {
    const myLabel  = _myName       || 'You';
    const oppLabel = _opponentName || 'Opponent';
    playerEl.textContent = (isOppTurn ? oppLabel : myLabel)
      + (inGuard ? ' \u2014 Guard' : '');
  } else {
    playerEl.textContent =
      `Player ${p + 1} (${PLAYER_NAMES[p]})${isAiTurn ? ' — AI' : ''}${inGuard ? ' — Guard' : ''}`;
  }
  playerEl.style.color = p === 0 ? '#e8d9c0' : '#c8a477';

  if (aiThinking) {
    msgEl.textContent = '';
    drawBtn.disabled  = true;
    return;
  }

  if (isOppTurn) {
    msgEl.textContent = 'Waiting for opponent\u2026';
    drawBtn.disabled  = true;
    return;
  }

  if (uiMode === 'draw')
    msgEl.textContent = 'Draw committed — click an adjacent square to place it.';
  else if (uiMode === 'selected')
    msgEl.textContent = 'Choose a destination, or click elsewhere to cancel.';
  else if (uiMode === 'cmd-to')
    msgEl.textContent = 'Choose a destination for the commanded tile.';
  else if (inGuard)
    msgEl.textContent = 'Your Duke is in Guard — you must resolve the threat.';
  else
    msgEl.textContent = 'Select a tile to move, or draw from the bag.';

  // Draw button
  const bagSize = state.bags[p].length;
  const canDraw = bagSize > 0 && legalMoves.some(m => m.action === 'draw');

  if (bagSize === 0)
    drawBtn.textContent = 'Bag empty';
  else if (!canDraw)
    drawBtn.textContent = 'No room to draw';
  else
    drawBtn.textContent = `Draw from Bag (${bagSize} left)`;

  drawBtn.disabled = !canDraw || uiMode !== 'idle' || isAiTurn;
}

function showGameOver() {
  document.getElementById('postgame-controls').hidden = false;
}

// ─── Board click handling ─────────────────────────────────────────────────────

canvas.addEventListener('click', function (evt) {
  if (aiThinking || animating) return;
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const x      = (evt.clientX - rect.left) * scaleX;
  const y      = (evt.clientY - rect.top)  * scaleY;
  const col    = _boardFlipped() ? 5 - Math.floor(x / cellSz) : Math.floor(x / cellSz);
  const row    = _boardFlipped() ? Math.floor(y / cellSz)      : 5 - Math.floor(y / cellSz);
  if (col < 0 || col > 5 || row < 0 || row > 5) return;
  handleClick(col, row);
});

canvas.addEventListener('mousemove', function (evt) {
  if (state.phase === 'gameover' || animating) { canvas.style.cursor = 'default'; return; }
  const rect   = canvas.getBoundingClientRect();
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  const x      = (evt.clientX - rect.left) * scaleX;
  const y      = (evt.clientY - rect.top)  * scaleY;
  const col    = _boardFlipped() ? 5 - Math.floor(x / cellSz) : Math.floor(x / cellSz);
  const row    = _boardFlipped() ? Math.floor(y / cellSz)      : 5 - Math.floor(y / cellSz);
  if (col < 0 || col > 5 || row < 0 || row > 5) { canvas.style.cursor = 'default'; return; }

  const hi   = computeHighlights();
  const cell = state.board[row]?.[col];
  const p    = state.currentPlayer;
  const isBrowseTurn = state.phase === 'active' && (!_isMyTurn() || aiThinking);
  const isInteractive =
    hi.has(cellKey(col, row)) ||
    (state.phase === 'active' && uiMode === 'idle' && cell?.player === p) ||
    (isBrowseTurn && cell !== null);
  canvas.style.cursor = isInteractive ? 'pointer' : 'default';
});

function handleClick(col, row) {
  // ── Setup phase ─────────────────────────────────────────────────────────────
  if (state.phase === 'setup') {
    if (_pendingMove !== null) return;  // staging: wait for confirm or undo
    const info = getSetupInfo(state);
    // Block if AI is handling this placement or it isn't our turn online.
    if (!info) return;
    if (gameMode === 'ai' && info.player === 1) return;
    if (_onlineMode && !_isMyTurn()) return;

    const isValid = info.targets.some(([tc, tr]) => tc === col && tr === row);
    if (isValid) {
      _pendingPreState = state;
      state = applySetupPlacement(state, col, row);
      _pendingMove = { action: 'setup' };
      document.getElementById('pending-controls').hidden = false;
      _startPendingTimer();
      render(); updateUI();
    }
    return;
  }

  if (state.phase !== 'active') return;

  // During opponent's turn (or while AI is thinking): allow clicking any tile
  // to browse its reverse side for strategic planning, but block all actions.
  if (!_isMyTurn() || aiThinking) {
    _showFlipPreview(col, row, 'Reverse side');
    render(); updateUI();
    return;
  }

  if (_pendingMove !== null) return; // staging: wait for confirm or undo

  // ── Draw placement mode ─────────────────────────────────────────────────────
  if (uiMode === 'draw') {
    const m = legalMoves.find(m => m.action === 'draw' && m.pos[0] === col && m.pos[1] === row);
    if (m) { commitMove(m); }
    // No cancel: the player has committed to drawing this turn.
    return;
  }

  // ── Command destination mode ─────────────────────────────────────────────────
  if (uiMode === 'cmd-to') {
    const [cc, cr] = uiCmdrPos;
    const [fc, fr] = uiCmdFrom;
    const m = legalMoves.find(m =>
      m.action === 'command' &&
      m.commander[0] === cc && m.commander[1] === cr &&
      m.from[0] === fc && m.from[1] === fr &&
      m.to[0] === col && m.to[1] === row
    );
    if (m) { commitMove(m); } else { resetUI(); render(); updateUI(); }
    return;
  }

  // ── Tile selected mode ───────────────────────────────────────────────────────
  if (uiMode === 'selected' && uiSelected) {
    const [sc, sr] = uiSelected;

    // Clicking the selected tile again deselects it
    if (col === sc && row === sr) {
      resetUI();
      render(); updateUI();
      return;
    }

    const moveM = legalMoves.find(m =>
      m.action === 'move' && m.from[0] === sc && m.from[1] === sr &&
      m.to[0] === col && m.to[1] === row
    );
    const strikeM = legalMoves.find(m =>
      m.action === 'strike' && m.from[0] === sc && m.from[1] === sr &&
      m.target[0] === col && m.target[1] === row
    );
    const cmdFromM = legalMoves.find(m =>
      m.action === 'command' && m.commander[0] === sc && m.commander[1] === sr &&
      m.from[0] === col && m.from[1] === row
    );

    if (moveM)   { commitMove(moveM);   return; }
    if (strikeM) { commitMove(strikeM); return; }

    if (cmdFromM) {
      // Transition to command-destination selection
      uiCmdrPos  = [sc, sr];
      uiCmdFrom  = [col, row];
      uiSelected = null;
      enterMode('cmd-to');
      render(); updateUI();
      return;
    }

    // Click didn't match any valid target — deselect, then try re-selecting
    resetUI();
    trySelect(col, row);
    _showFlipPreview(col, row);
    render(); updateUI();
    return;
  }

  // ── Idle — try to select a tile ─────────────────────────────────────────────
  trySelect(col, row);
  _showFlipPreview(col, row);
  render(); updateUI();
}

function trySelect(col, row) {
  const p    = state.currentPlayer;
  const cell = state.board[row][col];
  if (!cell || cell.player !== p) return;

  const hasMoves = legalMoves.some(m =>
    (m.action === 'move'   || m.action === 'strike') && m.from[0] === col && m.from[1] === row ||
    m.action === 'command' && m.commander[0] === col && m.commander[1] === row
  );
  if (!hasMoves) return;

  uiSelected = [col, row];
  enterMode('selected');
}

function commitMove(move) {
  const preState  = state;
  const postState = applyMove(preState, move);
  resetUI();

  // All moves (including winning ones): animate the preview, then hold for player review
  _stagingAnimation = true;
  playMoveAnimation(preState, postState, move, function () {
    _stagingAnimation = false;
    _pendingMove     = move;
    _pendingPreState = preState;
    legalMoves = [];   // block further moves until confirmed
    document.getElementById('pending-controls').hidden = false;
    _startPendingTimer();
    render(); updateUI();
  });
}

// ─── Pending move: confirm and undo ──────────────────────────────────────────

/**
 * Commit the staged move: sync to Firestore / trigger AI, then clear pending.
 * Called when the player clicks "Confirm Move".
 */
function submitTurn() {
  _clearPendingTimer();
  _clearDrawCommitted();
  const move       = _pendingMove;
  _pendingMove     = null;
  _pendingPreState = null;
  document.getElementById('pending-controls').hidden = true;

  if (move.action === 'setup') {
    // Setup placement confirmed — sync and hand off to AI / next step.
    if (_onlineMode) {
      _syncToFirestore(null).catch(console.error);
      if (state.phase === 'active') legalMoves = getLegalMoves(state);
    } else {
      if (state.phase === 'active') {
        legalMoves = getLegalMoves(state);
        triggerAI();
      } else {
        triggerAISetup();
      }
    }
    render(); updateUI();
    return;
  }

  // Active-phase move confirmed.
  legalMoves = state.phase === 'active' ? getLegalMoves(state) : [];
  render(); updateUI();
  if (_onlineMode) _syncToFirestore(move).catch(console.error);
  else triggerAI();
}

/**
 * Revert the staged move. Called when the player clicks "Undo Move" /
 * "Change Placement".
 *
 * For draw placements: the tile has already been pulled from the bag (that
 * part is irreversible), so we restore to the pre-placement state and
 * immediately re-enter draw mode — the player must pick a different square.
 *
 * For all other moves: restore to the pre-move state and return to idle so
 * the player can choose a different action.
 */
function undoMove() {
  _clearPendingTimer();
  const wasDrawPlacement = _pendingMove && _pendingMove.action === 'draw';
  state            = _pendingPreState;
  _pendingMove     = null;
  _pendingPreState = null;
  document.getElementById('pending-controls').hidden = true;

  if (wasDrawPlacement) {
    // Tile is still committed from the bag — force re-placement elsewhere.
    // peekBag() returns the same tile since we restored the pre-placement state.
    legalMoves = getLegalMoves(state);
    enterMode('draw');
    const p    = state.currentPlayer;
    const next = peekBag(state, p);
    if (next) {
      const pc  = document.getElementById('draw-tile-canvas');
      const sz  = 90;
      pc.width  = sz;
      pc.height = sz;
      drawTile(pc.getContext('2d'), 0, 0, sz, next, 0, p);
      document.getElementById('draw-tile-name').textContent = TILE_DISPLAY_NAMES[next] ?? next;
      document.getElementById('draw-preview').hidden = false;
    }
  } else {
    legalMoves = getLegalMoves(state);
    resetUI();
  }

  render(); updateUI();
}

// ─── Button handlers ──────────────────────────────────────────────────────────

document.getElementById('draw-btn').addEventListener('click', function () {
  enterMode('draw');
  _saveDrawCommitted();   // persist obligation so lobby-and-return can't escape it
  document.getElementById('flip-preview').hidden = true;

  // Reveal the tile that will be drawn so the player can plan placement
  const p    = state.currentPlayer;
  const next = peekBag(state, p);
  if (next) {
    const pc  = document.getElementById('draw-tile-canvas');
    const sz  = 90;
    pc.width  = sz;
    pc.height = sz;
    drawTile(pc.getContext('2d'), 0, 0, sz, next, 0, p);
    document.getElementById('draw-tile-name').textContent = TILE_DISPLAY_NAMES[next] ?? next;
    document.getElementById('draw-preview').hidden = false;
  }

  render(); updateUI();
});

document.getElementById('cancel-btn').addEventListener('click', function () {
  resetUI();
  render(); updateUI();
});

document.getElementById('undo-btn').addEventListener('click', undoMove);
document.getElementById('confirm-btn').addEventListener('click', submitTurn);

// Double-click / double-tap on the board auto-confirms a staged move.
// The first click of the pair stages the move (or is blocked if already pending);
// the second click is swallowed by the _pendingMove guard in handleClick();
// then dblclick fires here and commits.
canvas.addEventListener('dblclick', function () {
  if (_pendingMove !== null) submitTurn();
});

function _resetForNewGame() {
  _clearPendingTimer();
  _resignConfirming = false;
  const resignBtn = document.getElementById('resign-btn');
  resignBtn.textContent = 'Resign';
  resignBtn.classList.remove('confirming');
  document.getElementById('gameover-overlay').hidden  = true;
  document.getElementById('postgame-controls').hidden = true;
  document.getElementById('pending-controls').hidden  = true;
  _pendingMove     = null;
  _pendingPreState = null;
  if (aiWorker) { aiWorker.terminate(); aiWorker = null; }
  aiThinking = false;
  document.getElementById('thinking').textContent = '';
  state = createGame();
  legalMoves = [];
  resetUI();
  render();
  document.getElementById('difficulty-section').hidden = true;
  document.getElementById('mode-overlay').hidden = false;
}

document.getElementById('gameover-close').addEventListener('click', function () {
  document.getElementById('gameover-overlay').hidden = true;
});

document.getElementById('new-game-btn').addEventListener('click', _resetForNewGame);
function _goToLobby() {
  if (_onlineUnsub) _onlineUnsub();
  window.location.href = 'index.html';
}

// ─── Resign ───────────────────────────────────────────────────────────────────

let _resignConfirming = false;

function resignGame() {
  _clearPendingTimer();
  _clearDrawCommitted();
  _resignConfirming = false;
  const resignBtn = document.getElementById('resign-btn');
  resignBtn.textContent = 'Resign';
  resignBtn.classList.remove('confirming');

  // The resigning player loses — set winner to the opponent.
  const loser = _onlineMode ? _myPlayerIndex : state.currentPlayer;
  state = Object.assign({}, state, { phase: 'gameover', winner: 1 - loser });

  legalMoves = [];
  resetUI();
  render(); updateUI();
  if (_onlineMode) _syncToFirestore(null).catch(console.error);
}

document.getElementById('resign-btn').addEventListener('click', function () {
  if (!_resignConfirming) {
    _resignConfirming = true;
    this.textContent = 'Confirm Resign';
    this.classList.add('confirming');
    // Auto-revert after 4 seconds if not confirmed
    setTimeout(() => {
      if (_resignConfirming) {
        _resignConfirming = false;
        this.textContent = 'Resign';
        this.classList.remove('confirming');
      }
    }, 4000);
  } else {
    resignGame();
  }
});

document.getElementById('lobby-btn').addEventListener('click', _goToLobby);
document.getElementById('lobby-btn-post').addEventListener('click', _goToLobby);

document.getElementById('mode-hotseat').addEventListener('click', () => startNewGame('hotseat'));
document.getElementById('mode-ai').addEventListener('click', function () {
  document.getElementById('difficulty-section').hidden = false;
});
function _diffLabel(d) {
  const name = d <= 2 ? 'Easy' : d <= 5 ? 'Medium' : d <= 7 ? 'Hard' : 'Expert';
  return d + ' \u2014 ' + name;
}

document.getElementById('diff-slider').addEventListener('input', function () {
  document.getElementById('diff-label').textContent = _diffLabel(parseInt(this.value));
});

document.getElementById('diff-start').addEventListener('click', function () {
  startNewGame('ai', parseInt(document.getElementById('diff-slider').value));
});

function startNewGame(mode, depth) {
  gameMode   = mode;
  if (depth !== undefined) aiDepth = depth;
  aiThinking = false;
  document.getElementById('thinking').textContent = '';
  state      = createGame();
  legalMoves = [];
  resetUI();
  if (mode === 'ai') {
    initWorker();
    triggerAISetup();   // fires immediately if AI (player 1) sets up first
  }
  document.getElementById('mode-overlay').hidden = true;
  render(); updateUI();
}

// ─── Favicon ──────────────────────────────────────────────────────────────────
// Two variants pre-rendered at boot; _setFaviconAlert() swaps between them.
// "Your turn" variant adds a vivid purple dot with a white halo in the top-right
// corner — high contrast against the cream tile background for all vision types.

const _faviconLink = document.createElement('link');
_faviconLink.rel  = 'icon';
_faviconLink.type = 'image/png';
document.head.appendChild(_faviconLink);

const _faviconNormal = (function () {
  const sz = 128, fc = document.createElement('canvas');
  fc.width = sz; fc.height = sz;
  drawTile(fc.getContext('2d'), 0, 0, sz, 'duke', 0, 0);
  return fc.toDataURL('image/png');
}());

const _faviconYourTurn = (function () {
  const sz = 128, fc = document.createElement('canvas');
  fc.width = sz; fc.height = sz;
  const fCtx = fc.getContext('2d');
  drawTile(fCtx, 0, 0, sz, 'duke', 0, 0);
  // White halo — separates dot from any tile background colour
  fCtx.beginPath();
  fCtx.arc(96, 32, 32, 0, Math.PI * 2);
  fCtx.fillStyle = '#ffffff';
  fCtx.fill();
  // Purple dot — matches game colour theme, colourblind-safe
  fCtx.beginPath();
  fCtx.arc(96, 32, 26, 0, Math.PI * 2);
  fCtx.fillStyle = '#8020d8';
  fCtx.fill();
  return fc.toDataURL('image/png');
}());

_faviconLink.href = _faviconNormal;   // initial state

function _setFaviconAlert(active) {
  _faviconLink.href    = active ? _faviconYourTurn : _faviconNormal;
  document.title       = active ? 'Your Turn \u2014 The Duke' : 'The Duke';
}

// ─── Boot ─────────────────────────────────────────────────────────────────────

resizeCanvas();   // sizes canvas and calls render()

if (_onlineMode) {
  // Arriving from index.html with ?code=X&player=Y&seed=N.
  // Hide the mode overlay immediately; _initOnlineGame handles everything.
  document.getElementById('mode-overlay').hidden = true;
  _initOnlineGame().catch(console.error);
}
// Otherwise mode overlay is visible by default — wait for player to choose.
</script>
